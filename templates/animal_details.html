{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-6">
            <img src="{{ animal.image_url }}" class="img-fluid rounded" alt="{{ animal.name }}">
        </div>
        <div class="col-md-6">
            <h1>{{ animal.name }}</h1>
            <div class="mb-4">
                <p class="lead">{{ animal.description }}</p>
                <ul class="list-unstyled">
                    <li><strong>Species:</strong> {{ animal.species }}</li>
                    <li><strong>Breed:</strong> {{ animal.breed }}</li>
                    <li><strong>Age:</strong> {{ animal.age }} years</li>
                </ul>
            </div>
            <a href="{{ url_for('contact') }}" class="btn btn-primary btn-lg" data-loading>
                Inquire About {{ animal.name }}
            </a>
        </div>
    </div>
</div>
{% endblock %}
